name: CI & Deploy

# Поток разработки:
#   feature-ветка → PR в main → здесь гоняются гейты (web-ci + backend-ci)
#   ветка dev (staging кода) → push → гейты БЕЗ деплоя (валидация перед PR)
#   merge в main → гейты + авто-деплой на VPS
# Деплоит ТОЛЬКО push в main; на PR и на dev — только тесты (прод не трогаем).
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Гейт фронта: типы + сборка (ловит то, что роняло прод-билд) ──────────────
  web-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (монорепо, все workspaces)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace web

      - name: Test (vitest)
        run: npm run test --workspace web

      - name: Build
        run: npm run build --workspace web

  # ── Гейт бэкенда: системные проверки Django + НЕзабытые миграции + тесты ──────
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Postgres как в проде: часть запросов (roles__contains на JSONField) SQLite не умеет.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cosplayhub
          POSTGRES_PASSWORD: cosplayhub
          POSTGRES_DB: cosplayhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install
        run: pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check

      - name: Проверка незакоммиченных миграций
        # Миграции в проекте пишутся ВРУЧНУЮ — этот шаг падает, если модель
        # изменили, а миграцию не создали (поймает до деплоя на VPS).
        run: python manage.py makemigrations --check --dry-run

      - name: Тесты (pytest)
        # БД — сервис postgres выше; кеш/почта в память (config/settings/test.py).
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: cosplayhub
          POSTGRES_USER: cosplayhub
          POSTGRES_PASSWORD: cosplayhub
        run: python -m pytest

  # ── Деплой только если оба гейта зелёные И это push в main ────────────────────
  # На PR и на push в dev этот job пропускается (if): прод обновляется только
  # после мержа в main.
  deploy:
    needs: [web-ci, backend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            if [ ! -d /opt/cosplayhub ]; then
              git clone https://github.com/sovest905-blip/cosplayhub.git /opt/cosplayhub
            fi
            cd /opt/cosplayhub
            git pull origin main
            cd backend
            docker compose up -d --build
            # ВАЖНО: пересборка web/frontend даёт контейнерам НОВЫЕ IP в docker-сети,
            # а nginx резолвит upstream один раз при старте и кэширует старый IP →
            # после деплоя ловили 502 (connect refused к мёртвому IP). Перезапуск
            # nginx заставляет его перечитать актуальные адреса.
            docker compose restart nginx
            docker compose exec -T web python manage.py migrate --noinput
            docker compose exec -T web python manage.py collectstatic --noinput
            echo "Deploy done! Site: https://cosplayhub.kz"
