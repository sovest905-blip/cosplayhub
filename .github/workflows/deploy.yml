name: CI & Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Гейт фронта: типы + сборка (ловит то, что роняло прод-билд) ──────────────
  web-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (монорепо, все workspaces)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace web

      - name: Build
        run: npm run build --workspace web

  # ── Гейт бэкенда: системные проверки Django + НЕзабытые миграции ─────────────
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install
        run: pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check

      - name: Проверка незакоммиченных миграций
        # Миграции в проекте пишутся ВРУЧНУЮ — этот шаг падает, если модель
        # изменили, а миграцию не создали (поймает до деплоя на VPS).
        run: python manage.py makemigrations --check --dry-run

      - name: Тесты (pytest)
        # Изолированы: SQLite в памяти + locmem cache/email (см. config/settings/test.py),
        # Postgres/Redis в CI не нужны.
        run: python -m pytest

  # ── Деплой только если оба гейта зелёные ─────────────────────────────────────
  deploy:
    needs: [web-ci, backend-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            if [ ! -d /opt/cosplayhub ]; then
              git clone https://github.com/sovest905-blip/cosplayhub.git /opt/cosplayhub
            fi
            cd /opt/cosplayhub
            git pull origin main
            cd backend
            docker compose up -d --build
            docker compose exec -T web python manage.py migrate --noinput
            docker compose exec -T web python manage.py collectstatic --noinput
            echo "Deploy done! Site: http://109.235.118.28:8080"
