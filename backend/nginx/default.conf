# Реальный IP клиента из X-Forwarded-For (доверяем только фронтовому Plesk-прокси
# в docker-сети 172.18.0.0/16). Прямые хиты на :8080 идут с реального $remote_addr,
# поэтому подделать XFF в обход не выйдет.
set_real_ip_from 172.18.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Анти-брутфорс для входа в Django-админку: лимит попыток по IP.
limit_req_zone $binary_remote_addr zone=adminlogin:10m rate=20r/m;

server {
    listen 80;
    client_max_body_size 10M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /static/ { alias /static/; }
    location /media/  {
        root /;   # файлы лежат в /media/ → URI /media/x = /media/x
        # Опасные расширения (svg/html/js/xml) принудительно отдаём как вложение,
        # чтобы залитый файл не исполнялся в origin (защита от stored XSS).
        location ~* \.(svgz?|html?|xml|js|mjs)$ {
            add_header Content-Disposition "attachment" always;
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Форма входа — отдельный лимит (20/мин на IP, всплеск 10).
        # Обычный вход = 1 GET + 1 POST, легко укладывается; боты-перебор → 429.
        location = /admin/login/ {
            limit_req zone=adminlogin burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Хэшированные ассеты Next.js — безопасно кэшировать навсегда (имя меняется при сборке)
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # сохраняем immutable Cache-Control от Next.js (не трогаем)
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # HTML/RSC — НЕ кэшировать долго: браузер всегда сверяется по ETag,
        # иначе старый HTML ссылается на удалённые после пересборки чанки → слетают шрифты/стили
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Powered-By;
        add_header Cache-Control "no-cache" always;
        # add_header сбрасывает унаследованные — дублируем безопасные заголовки
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
