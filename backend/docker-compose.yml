# Пилот: один сервер, всё в Docker Compose. Без Kubernetes.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ИБ: НЕ пробрасываем порт наружу — БД доступна только внутри docker-сети
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    env_file: .env
    volumes:
      - ./:/app
      - media:/app/media
      - static:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"   # наружу торчит только nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media:/media
      - static:/static
    depends_on:
      - web

volumes:
  pgdata:
  media:
  static:
